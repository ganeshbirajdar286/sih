  services:
    web:
      build: ./frontend  
      depends_on:
        backend:
          condition: service_healthy
      ports:
        - "3002:5173"
      networks:
        - app-network
      environment:
        VITE_API_URL: http://localhost:3001/api
        VITE_SOCKET_URL: http://localhost:3001
      restart: always
      healthcheck:
        test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173', res => process.exit(res.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
        interval: 5s
        timeout: 3s
        retries: 10
        start_period: 20s   # give Vite time to boot
      

    backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      depends_on:
        db:
          condition: service_healthy
      ports:
        - "3001:3001"
      env_file:
        - ./backend/.env
      networks:
        - app-network

      healthcheck:
        test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s
      restart: always
    db:
      image: mongo:latest
      ports:
        - "27018:27017"
      volumes:
        - anime:/data/db
      networks:
        - app-network

      healthcheck:
        test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
        interval: 10s
        timeout: 5s
        retries: 5
      restart: always
      
  volumes:
    anime:

  networks:
    app-network:
      driver: bridge