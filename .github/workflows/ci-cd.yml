# Production-level CI/CD Pipeline for Full-Stack Application
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  actions: read
  security-events: write

env:
  NODE_VERSION: '24'
  MONGODB_URI: ${{ secrets.MONGODB_URI }}

jobs:
  # Job 1: Lint
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'  # use for downloading dependencies
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci 
        # ci means clean install dependencies  
          
      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Lint backend
        run: |
          cd backend
          npm run lint || echo "No lint script configured for backend"

  # Job 2: Frontend Testing
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:run

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          npm run test:coverage
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()  
        # Run this step even if tests fail.
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

  # Job 3: Backend Testing
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:  #Docker containers 
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm test
        env:
          MONGODB_URI: mongodb://admin:password@localhost:27017/test?authSource=admin
          NODE_ENV: test

      - name: Run backend  tests with coverage
        run : |
         cd backend 
         npm run test:coverage 
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 30

  # Job 4: Build Frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # Job 5: Security Scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run npm audit (frontend)
        run: |
          cd frontend
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run npm audit (backend)
        run: |
          cd backend
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # Job 6: Deploy to Production
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-frontend, test-backend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

      - name: Deploy backend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"  

      - name: Wait for Render to deploy  
        run: |
              for i in {1..18}; do
              echo "Checking deployment... Attempt $i"
              if curl -L -f "${{ secrets.APP_URL }}/health"; then 
              exit 0
              fi
              sleep 10
              done
              echo "Deployment failed health check"
              exit 1


      - name: Health check
        run: |
          curl -f ${{ secrets.APP_URL }}/health || exit 1

      - name: Notify deployment success
        uses: actions/github-script@v7   #This action lets you run JavaScript directly inside GitHub Actions.
        if: success()

        # Creates a comment attached to a commit
        with:
          script: |
            github.rest.repos.createCommitComment({       
              owner: context.repo.owner,    
              repo: context.repo.repo, 
              commit_sha: context.sha,   
              body: '✅ Deployment to Render production successful!'
            })

  # Job 7: Docker Build & Push
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-frontend, test-backend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/swasthya-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/swasthya-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/swasthya-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/swasthya-backend:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/swasthya-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/swasthya-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/swasthya-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/swasthya-frontend:buildcache,mode=max

  # Job 8: Docker Compose Integration Test
  docker-compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create backend .env file
        run: |
          cat > backend/.env << EOF
          Port=3005
          MONGODB_URL=mongodb://db:27017/swasthya
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          GROQ_APT_KEY=${{ secrets.GROQ_API_KEY }}
          FRONTEND_URL=http://localhost:3002
          NODE_ENV=production
          EOF

      - name: Start services with Docker Compose
        run: |
           docker compose up -d

      - name: Wait for backend startup
        run: sleep 25

      - name: Show backend logs               
        run: docker compose logs backend

      - name: Wait for services to be healthy
        run: |
          timeout 180 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 5; done'

      - name: Check service logs
        run: |
          docker compose logs

      - name: Test backend health endpoint
        run: |
          curl -f http://localhost:3005/health || exit 1

      - name: Test frontend is accessible
        run: |
         for i in {1..20}; do
         echo "Checking frontend... Attempt $i"

         if curl -f http://localhost:3002; then
         echo "Frontend is up!"
         exit 0
         fi

         sleep 5
         done
         echo "Frontend failed to start"
         docker compose logs web
         exit 1

      - name: Stop services
        run: |
          docker compose down

  # Job 9: Notify on Failure
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test-frontend, test-backend, build-frontend, security-scan, docker-build, docker-compose-test]
    if: failure()

    steps:
      - name: Send failure notification
        uses: actions/github-script@v7
        with:
          script: |
            const workflow = '${{ github.workflow }}';
            const runNumber = '${{ github.run_number }}';
            const repo = '${{ github.repository }}';
            const actor = '${{ github.actor }}';

            const message = ` Pipeline Failed: ${workflow}
            Run: #${runNumber}
            Repository: ${repo}
            Triggered by: ${actor}
            View details: ${context.serverUrl}/${repo}/actions/runs/${context.runId}`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline Failure: ${workflow} #${runNumber}`,
              body: message,
              labels: ['pipeline-failure', 'bug']
            });
