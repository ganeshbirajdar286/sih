  services:
    web:
      build: ./frontend  
      depends_on:
        backend:
          condition: service_healthy
      ports:
        - "3002:5173"
      networks:
        - app-network
      environment:
        VITE_API_URL: http://localhost:3009/api
        VITE_SOCKET_URL: http://localhost:3009
      restart: always
      healthcheck:
        test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173', res => process.exit(res.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
        interval: 5s
        timeout: 3s
        retries: 10
        start_period: 20s   # give Vite time to boot
      


    backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      depends_on:
        # db:
        #   condition: service_healthy
        redis:
          condition:  service_healthy
      ports:
        - "3009:3009"
      env_file:
        - ./backend/.env.docker
      networks:
        - app-network
      command: sh -c "printenv REDIS_URL && node index.js"

      healthcheck:
        test: ["CMD", "node", "-e", "require('http').get('http://localhost:3009/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 40s
      restart: always

    # db:
    #   image: mongo:latest
    #   ports:
    #     - "27018:27017"
    #   volumes:
    #     - anime:/data/db
    #   networks:
    #     - app-network

    #   healthcheck:
    #     test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
    #     interval: 10s
    #     timeout: 5s
    #     retries: 5
    #   restart: always

    redis:
       image: redis:alpine
       ports:
          - "6379:6379"
       networks:
         - app-network
       restart: always
       volumes:
         - redis_data:/data
       healthcheck:
          test: ["CMD", "redis-cli", "ping"]
          interval: 10s
          timeout: 3s
          retries: 5


      
  volumes:
    redis_data:

  networks:
    app-network:
      driver: bridge